version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: guitar_tabs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ['5432:5432']
    volumes: ['pg_data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d guitar_tabs']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/guitar_tabs
      REDIS_URL: redis://redis:6379/0
    ports: ['8000:8000']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ['app']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/guitar_tabs
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ['app']

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ['5173:80']
    depends_on:
      backend:
        condition: service_started
    profiles: ['app']

volumes:
  pg_data:
